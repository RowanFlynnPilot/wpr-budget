    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wausau Pilot & Review" />
    <meta property="og:title" content="Follow the Money — Wausau Pilot & Review" />

    <!-- Open-data discovery: the suite's reconciled budget extracts, one JSON
         per entity (the same files the Methodology sections link). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "Follow the Money — Wausau-area government budget data",
      "description": "Reconciled, machine-readable extracts of the adopted budgets of Marathon County, the City of Wausau, and the Wausau School District: general-fund detail, departments and funds, tax levies, mill rates, and outstanding debt. Every figure is extracted from the official budget PDFs and checked against their printed totals.",
      "url": "https://rowanflynnpilot.github.io/wpr-budget/",
      "isAccessibleForFree": true,
      "creator": {
        "@type": "NewsMediaOrganization",
        "name": "Wausau Pilot & Review",
        "url": "https://wausaupilotandreview.com"
      },
      "distribution": [
        {
          "@type": "DataDownload",
          "name": "Marathon County adopted budget (JSON)",
          "encodingFormat": "application/json",
          "contentUrl": "https://rowanflynnpilot.github.io/wpr-budget/marathon-county.json"
        },
        {
          "@type": "DataDownload",
          "name": "City of Wausau adopted budget (JSON)",
          "encodingFormat": "application/json",
          "contentUrl": "https://rowanflynnpilot.github.io/wpr-budget/wausau-city.json"
        },
        {
          "@type": "DataDownload",
          "name": "Wausau School District adopted budget (JSON)",
          "encodingFormat": "application/json",
          "contentUrl": "https://rowanflynnpilot.github.io/wpr-budget/wausau-school.json"
        }
      ]
    }
    </script>
